name: Company Control Loop

on:
  schedule:
    - cron: '0 8 * * *'  # daily 08:00 UTC
  workflow_dispatch:       # manual trigger
  repository_dispatch:     # webhook events (payment, alert, etc.)
    types: [company-signal]

permissions:
  contents: write
  issues: write
  pull-requests: read
  actions: read

concurrency:
  group: company-loop
  cancel-in-progress: false

jobs:
  loop:
    name: Observe → Assess → Act
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          fetch-depth: 0

      # ── Collect state ──────────────────────────────────────────

      - name: Collect GitHub signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash company/scripts/collect-github.sh > /tmp/github.json

      - name: Collect infrastructure signals
        run: bash company/scripts/collect-infra.sh > /tmp/infra.json

      - name: Collect contribution signals
        run: bash company/scripts/collect-contributions.sh > /tmp/contributions.json

      - name: Read recent assessments
        run: |
          {
            ls -t company/loop-history/*.md 2>/dev/null | head -3 | while read -r f; do
              echo "--- $(basename "$f") ---"
              cat "$f"
              echo ""
            done
          } > /tmp/history.txt 2>/dev/null || echo "No prior assessments." > /tmp/history.txt

      - name: Merge state snapshot
        run: |
          jq -n \
            --slurpfile github /tmp/github.json \
            --slurpfile infra /tmp/infra.json \
            --slurpfile contributions /tmp/contributions.json \
            --slurpfile loop_state company/loop-state.json \
            --slurpfile costs company/costs.json \
            '{
              github: $github[0],
              infrastructure: $infra[0],
              contributions: $contributions[0],
              loop_state: $loop_state[0],
              costs: $costs[0]
            }' > /tmp/snapshot.json

      # ── Assess ─────────────────────────────────────────────────

      - name: Call LLM (or generate stub)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::OPENROUTER_API_KEY not set — generating stub assessment."
            today=$(date -u '+%Y-%m-%d')
            cat > /tmp/assessment.json <<STUBEOF
          {
            "timestamp": "${today}T08:00:00Z",
            "funnel_stage": 0,
            "stage_name": "Foundation",
            "runway": {"monthly_burn_eur": null, "months_remaining": null, "survival_mode": false},
            "assessment": "First run — OPENROUTER_API_KEY not configured. The loop infrastructure is deployed but cannot call the LLM yet. This is a needs-human blocker.",
            "blockers": ["OPENROUTER_API_KEY not set in GitHub secrets"],
            "top_actions": [{"rank": 1, "action": "Set OPENROUTER_API_KEY in repo secrets", "function": "fn:ops", "leverage": "Unblocks the entire control loop", "cost": "cheap"}],
            "issues_to_create": [],
            "issues_to_close": [],
            "contributions": [],
            "reciprocation_proposals": [],
            "needs_human": [{"request": "Add OPENROUTER_API_KEY to repository secrets", "reason": "Loop cannot function without LLM access", "urgency": "blocking"}]
          }
          STUBEOF
          else
            # Build user message with state snapshot
            cat > /tmp/user_message.txt <<MSGEOF
          Here is the current state snapshot for your assessment:

          ## State Snapshot
          $(cat /tmp/snapshot.json)

          ## Recent Assessment History
          $(cat /tmp/history.txt)

          Please provide your assessment as a JSON object per the output format in your system prompt.
          MSGEOF

            # Call OpenRouter API (Anthropic-compatible)
            jq -n \
              --rawfile system company/system-prompt.md \
              --rawfile user /tmp/user_message.txt \
              '{
                model: "anthropic/claude-sonnet-4",
                max_tokens: 4096,
                messages: [{role: "system", content: $system}, {role: "user", content: $user}]
              }' > /tmp/request.json

            http_code=$(curl -s -w '%{http_code}' -o /tmp/llm_response.json \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -H "content-type: application/json" \
              -d @/tmp/request.json \
              https://openrouter.ai/api/v1/chat/completions)

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              content=$(jq -r '.choices[0].message.content' /tmp/llm_response.json)
              echo "$content" | sed -n '/^```json/,/^```$/p' | sed '1d;$d' > /tmp/assessment.json
              if [ ! -s /tmp/assessment.json ]; then
                echo "$content" | jq . > /tmp/assessment.json 2>/dev/null || echo "$content" > /tmp/assessment.json
              fi
            else
              api_error=$(jq -r '.error.message // "unknown error"' /tmp/llm_response.json 2>/dev/null || echo "HTTP $http_code")
              echo "::warning::OpenRouter API returned HTTP $http_code: $api_error — falling back to stub."
              today=$(date -u '+%Y-%m-%d')
              jq -n --arg ts "${today}T08:00:00Z" --arg err "$api_error" '{
                timestamp: $ts, funnel_stage: 0, stage_name: "Foundation",
                runway: {monthly_burn_eur: null, months_remaining: null, survival_mode: false},
                assessment: ("LLM call failed: " + $err + ". Falling back to stub assessment."),
                blockers: [("Anthropic API error: " + $err)],
                top_actions: [{rank: 1, action: "Fix Anthropic API access", function: "fn:ops", leverage: "Unblocks LLM assessments", cost: "cheap"}],
                issues_to_create: [], issues_to_close: [], contributions: [], reciprocation_proposals: [],
                needs_human: [{request: "Fix Anthropic API access", reason: $err, urgency: "blocking"}]
              }' > /tmp/assessment.json
            fi
          fi

      - name: Generate markdown assessment
        run: |
          today=$(date -u '+%Y-%m-%d')
          stage=$(jq -r '.stage_name // "Unknown"' /tmp/assessment.json)
          narrative=$(jq -r '.assessment // "No assessment available."' /tmp/assessment.json)
          blockers=$(jq -r '(.blockers // []) | map("- " + .) | join("\n")' /tmp/assessment.json)
          actions=$(jq -r '(.top_actions // []) | map("- **" + (.function // "?") + "**: " + (.action // "?") + " (" + (.cost // "?") + ")") | join("\n")' /tmp/assessment.json)
          contribs=$(jq -r '(.contributions // []) | map("- **" + .entity + "**: " + .detail) | join("\n")' /tmp/assessment.json)
          human=$(jq -r '(.needs_human // []) | map("- [" + .urgency + "] " + .request) | join("\n")' /tmp/assessment.json)

          cat > /tmp/assessment.md <<MDEOF
          # Assessment: $today

          **Stage**: $stage | **Run**: $(( $(jq -r '.run_count // 0' company/loop-state.json) + 1 ))

          $narrative

          ## Blockers
          $blockers

          ## Top Actions
          $actions

          ## Contributions
          ${contribs:-_None recorded this cycle._}

          ## Needs Human
          ${human:-_Nothing this cycle._}
          MDEOF

      # ── Act ────────────────────────────────────────────────────

      - name: Save assessment to loop history
        run: |
          today=$(date -u '+%Y%m%d')
          cp /tmp/assessment.md "company/loop-history/${today}-assessment.md"

      - name: Update loop state
        run: |
          today=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          stage=$(jq -r '.funnel_stage // 0' /tmp/assessment.json)
          stage_name=$(jq -r '.stage_name // "Foundation"' /tmp/assessment.json)
          prev_count=$(jq -r '.run_count // 0' company/loop-state.json)
          new_count=$((prev_count + 1))

          jq --arg ts "$today" \
             --argjson stage "$stage" \
             --arg name "$stage_name" \
             --argjson count "$new_count" \
             '.last_run = $ts | .funnel_stage = $stage | .stage_name = $name | .run_count = $count' \
             company/loop-state.json > /tmp/new-state.json
          mv /tmp/new-state.json company/loop-state.json

      - name: Sanitise before commit
        run: |
          today=$(date -u '+%Y%m%d')
          cat "company/loop-history/${today}-assessment.md" | bash company/scripts/sanitise.sh > /dev/null
          cat company/loop-state.json | bash company/scripts/sanitise.sh > /dev/null

      - name: Commit state
        env:
          GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          git config user.name "company-loop[bot]"
          git config user.email "company-loop[bot]@users.noreply.github.com"
          git add company/loop-state.json company/loop-history/
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          today=$(date -u '+%Y-%m-%d')
          branch="loop/assessment-${today}-${GITHUB_RUN_ID}"
          git checkout -b "$branch" origin/main
          git commit -m "loop: daily assessment $today"
          git push -u origin "$branch"

          pr_url=$(gh pr create \
            --title "loop: daily assessment $today" \
            --body "Automated assessment from company control loop." \
            --base main \
            --head "$branch")
          gh pr merge "$pr_url" --squash --admin --delete-branch

          git checkout main
          git pull origin main

      - name: Create issues from assessment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all open issue titles once for local dedup
          gh issue list --state open --limit 100 --json title --jq '.[].title' > /tmp/open_issues.txt 2>/dev/null || touch /tmp/open_issues.txt

          jq -c '.issues_to_create // [] | .[]' /tmp/assessment.json | while read -r issue; do
            title=$(echo "$issue" | jq -r '.title')
            body=$(echo "$issue" | jq -r '.body')
            labels=$(echo "$issue" | jq -r '.labels | join(",")')

            # Extract key words for fuzzy matching (skip common filler words)
            keywords=$(echo "$title" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '\n' | grep -v -E '^(the|a|an|in|on|for|to|of|and|or|is|set|add|configure|verify|check|update)$' | head -3)
            match_count=0
            while IFS= read -r existing_title; do
              existing_lower=$(echo "$existing_title" | tr '[:upper:]' '[:lower:]')
              hits=0
              for kw in $keywords; do
                if echo "$existing_lower" | grep -q "$kw"; then
                  hits=$((hits + 1))
                fi
              done
              if [ "$hits" -ge 2 ]; then
                match_count=$((match_count + 1))
                break
              fi
            done < /tmp/open_issues.txt

            if [ "$match_count" = "0" ]; then
              gh issue create --title "$title" --body "$body" --label "$labels" || true
              echo "$title" >> /tmp/open_issues.txt
            else
              echo "Skipping duplicate: $title"
            fi
          done

      - name: Close issues from assessment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -c '.issues_to_close // [] | .[]' /tmp/assessment.json | while read -r item; do
            number=$(echo "$item" | jq -r '.number')
            reason=$(echo "$item" | jq -r '.reason')
            gh issue close "$number" --comment "Closed by company loop: $reason" || true
          done

      - name: Create needs-human issue if requested
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reuse open issues list (or fetch if not available)
          if [ ! -f /tmp/open_issues.txt ]; then
            gh issue list --state open --limit 100 --json title --jq '.[].title' > /tmp/open_issues.txt 2>/dev/null || touch /tmp/open_issues.txt
          fi

          jq -c '.needs_human // [] | .[]' /tmp/assessment.json | while read -r req; do
            request=$(echo "$req" | jq -r '.request')
            reason=$(echo "$req" | jq -r '.reason')
            urgency=$(echo "$req" | jq -r '.urgency')
            full_title="[needs-human] $request"

            # Fuzzy dedup against existing open issues
            keywords=$(echo "$request" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '\n' | grep -v -E '^(the|a|an|in|on|for|to|of|and|or|is|set|add|configure|verify|check|update)$' | head -3)
            match_count=0
            while IFS= read -r existing_title; do
              existing_lower=$(echo "$existing_title" | tr '[:upper:]' '[:lower:]')
              hits=0
              for kw in $keywords; do
                if echo "$existing_lower" | grep -q "$kw"; then
                  hits=$((hits + 1))
                fi
              done
              if [ "$hits" -ge 2 ]; then
                match_count=$((match_count + 1))
                break
              fi
            done < /tmp/open_issues.txt

            if [ "$match_count" = "0" ]; then
              body=$(printf '**Urgency**: %s\n\n**Reason**: %s\n\n_Created by company control loop._' "$urgency" "$reason")
              gh issue create \
                --title "$full_title" \
                --body "$body" \
                --label "needs-human" || true
              echo "$full_title" >> /tmp/open_issues.txt
            else
              echo "Skipping duplicate needs-human: $request"
            fi
          done
