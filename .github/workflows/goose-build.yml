name: Goose Implementation

# Triggered when:
# 1. A spec PR is labeled 'approved-for-build' (normal flow)
# 2. Manually via workflow_dispatch (re-trigger for merged PRs or retries)

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement (e.g. 24)'
        required: true
        type: string
      spec_pr_number:
        description: 'Spec PR number (for tracking, e.g. 28)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  implement:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'approved-for-build'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: >-
        goose-implement-${{
          github.event_name == 'workflow_dispatch'
          && github.event.inputs.issue_number
          || github.event.pull_request.number
        }}
      cancel-in-progress: false

    steps:
      # ── Validate prerequisites ──────────────────────────
      - name: Validate API key is configured
        env:
          KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::GOOGLE_API_KEY secret is not configured. Add it in Settings > Secrets > Actions."
            exit 1
          fi

      - name: Verify authorization
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (context.eventName === 'workflow_dispatch') {
              console.log(`Manual dispatch by @${context.actor}`);
              return;
            }
            const sender = context.payload.sender;
            if (sender) {
              try {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: sender.login
                });
                if (!['admin', 'write'].includes(perm.permission)) {
                  core.setFailed(`Label applied by @${sender.login} who lacks write access (has: ${perm.permission})`);
                  return;
                }
                console.log(`Label applied by @${sender.login} (${perm.permission} access)`);
              } catch (error) {
                core.setFailed(`Failed to verify permissions for @${sender.login}: ${error.message}`);
                return;
              }
            }

      # ── Setup ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Goose CLI
        run: |
          curl -fsSL "https://github.com/block/goose/releases/latest/download/download_cli.sh" \
            -o /tmp/goose-install.sh
          CONFIGURE=false bash /tmp/goose-install.sh
          rm /tmp/goose-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          $HOME/.local/bin/goose --version

      # ── Memory: setup and restore cache ─────────────────
      - name: Setup Python (for mem0)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mem0 dependencies
        run: |
          pip install --quiet \
            'mem0ai==1.0.4' \
            'litellm==1.81.13' \
            'sentence-transformers==5.2.3' \
            2>&1 || echo "::warning::mem0 pip install failed (non-fatal, memory features disabled)"

      - name: Decrypt mem0 database after restore
        env:
          MEM0_ENCRYPTION_KEY: ${{ secrets.MEM0_ENCRYPTION_KEY }}
        run: |
          if [ -f "/tmp/mem0-encrypted.tar.gz.enc" ] && [ -n "$MEM0_ENCRYPTION_KEY" ]; then
            openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
              -pass env:MEM0_ENCRYPTION_KEY \
              -in /tmp/mem0-encrypted.tar.gz.enc | tar xzf - -C /
            [ -d "/tmp/mem0-qdrant" ] && echo "Decrypted: $(du -sh /tmp/mem0-qdrant | cut -f1)" || echo "::warning::Decryption failed"
          fi

      - name: Restore mem0 memory cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /tmp/mem0-encrypted.tar.gz.enc
            /tmp/mem0-qdrant
          key: mem0-db-${{ github.repository }}-v1
          restore-keys: |
            mem0-db-${{ github.repository }}-

      - name: Restore HuggingFace model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-embeddings-multi-qa-MiniLM-L6-cos-v1

      # ── Extract spec details ───────────────────────────
      - name: Extract issue number and spec metadata
        id: spec
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let issueNumber, specBranch, specPRNumber;

            if (context.eventName === 'workflow_dispatch') {
              issueNumber = context.payload.inputs.issue_number;
              specPRNumber = context.payload.inputs.spec_pr_number;
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(specPRNumber),
              });
              specBranch = pr.head.ref;
              console.log(`Manual dispatch: issue #${issueNumber}, spec PR #${specPRNumber} (${pr.state})`);
            } else {
              const pr = context.payload.pull_request;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });

              issueNumber = null;
              for (const file of files) {
                const match = file.filename.match(/^specs\/issue-(\d+)-spec\.md$/);
                if (match) { issueNumber = match[1]; break; }
              }
              if (!issueNumber) {
                const titleMatch = pr.title.match(/Issue #(\d+)/);
                if (titleMatch) issueNumber = titleMatch[1];
              }
              if (!issueNumber) {
                core.setFailed('Could not extract issue number from spec filename or PR title.');
                return;
              }
              specBranch = pr.head.ref;
              specPRNumber = String(pr.number);
            }

            core.setOutput('issue_number', issueNumber);
            core.setOutput('spec_branch', specBranch);
            core.setOutput('spec_pr_number', specPRNumber);
            core.setOutput('impl_branch', `goose/issue-${issueNumber}`);

      - name: Fetch spec file
        env:
          SPEC_BRANCH: ${{ steps.spec.outputs.spec_branch }}
          ISSUE_NUM: ${{ steps.spec.outputs.issue_number }}
        run: |
          SPEC_FILE="specs/issue-${ISSUE_NUM}-spec.md"
          if [ ! -f "$SPEC_FILE" ]; then
            git fetch origin "$SPEC_BRANCH" 2>/dev/null || true
            git checkout "origin/$SPEC_BRANCH" -- "$SPEC_FILE" 2>/dev/null || true
          fi
          if [ ! -f "$SPEC_FILE" ]; then
            echo "::error::Spec file not found: $SPEC_FILE"
            exit 1
          fi
          echo "Found spec file: $SPEC_FILE"

      # ── Prepare implementation branch ──────────────────
      - name: Create implementation branch
        env:
          IMPL_BRANCH: ${{ steps.spec.outputs.impl_branch }}
        run: |
          git checkout main
          if git ls-remote --heads origin "$IMPL_BRANCH" | grep -q "refs/heads/${IMPL_BRANCH}$"; then
            git push origin --delete "$IMPL_BRANCH"
          fi
          git checkout -b "$IMPL_BRANCH"

      # ── Build context and run Goose ────────────────────
      - name: Generate codebase context
        run: bash company/scripts/goose-build-context.sh /tmp/codebase-context.md

      - name: Retrieve memories from past runs
        env:
          ISSUE_NUM: ${{ steps.spec.outputs.issue_number }}
        run: |
          python .github/scripts/mem0-retrieve.py \
            "$ISSUE_NUM" \
            /tmp/memory-context.md \
            || echo "Memory retrieval failed (non-fatal)"
          if [ -s /tmp/memory-context.md ]; then
            echo "" >> /tmp/codebase-context.md
            echo "## Memory from Past Runs" >> /tmp/codebase-context.md
            cat /tmp/memory-context.md >> /tmp/codebase-context.md
          fi

      - name: Run Goose with recipe
        id: goose
        env:
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GOOSE_MODE: "auto"
          ISSUE_NUM: ${{ steps.spec.outputs.issue_number }}
        run: |
          SPEC_FILE="specs/issue-${ISSUE_NUM}-spec.md"
          GOOSE_START=$(date +%s)
          set +e
          goose run \
            --recipe .github/goose-recipes/wgmesh-implementation.yaml \
            --params "spec_file=$SPEC_FILE" \
            --no-session \
            2>&1 | tee /tmp/goose-output.log
          GOOSE_EXIT=$?
          set -e

          GOOSE_END=$(date +%s)
          echo "goose_exit=$GOOSE_EXIT" >> "$GITHUB_OUTPUT"
          echo "goose_duration=$((GOOSE_END - GOOSE_START))" >> "$GITHUB_OUTPUT"
          echo "goose_lines=$(wc -l < /tmp/goose-output.log)" >> "$GITHUB_OUTPUT"

          # Recipe handles retry+checks natively.
          # Non-zero exit = all retries exhausted.
          if [ "$GOOSE_EXIT" -ne 0 ]; then
            CLEAN_LOG=$(grep -vE 'grep|\.yml|\.yaml|\.sh|^\s*#|^\s*//|^\d+:' /tmp/goose-output.log || true)
            if echo "$CLEAN_LOG" | grep -qiE "401 unauthorized|authentication failed|api key is invalid"; then
              echo "::error::Authentication failure (non-recoverable)"
            else
              echo "::warning::Goose exited $GOOSE_EXIT"
            fi
            # Fail the step so that jobs do not continue with a failed Goose run.
            exit "$GOOSE_EXIT"
          fi
          echo "goose_succeeded=$( [ $GOOSE_EXIT -eq 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      # ── Memory: save learnings ─────────────────────────
      - name: Save memories from this run
        if: always()
        env:
          ISSUE_NUM: ${{ steps.spec.outputs.issue_number }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            OUTCOME="failure"
          elif go build ./... 2>/dev/null && go test ./... 2>/dev/null && go vet ./... 2>/dev/null; then
            OUTCOME="success"
          else
            OUTCOME="failure"
          fi
          python .github/scripts/mem0-save.py "$ISSUE_NUM" /tmp/goose-output.log "$OUTCOME" \
            || echo "Memory save failed (non-fatal)"

      - name: Encrypt mem0 database for caching
        if: always()
        env:
          MEM0_ENCRYPTION_KEY: ${{ secrets.MEM0_ENCRYPTION_KEY }}
        run: |
          if [ -d "/tmp/mem0-qdrant" ] && [ -n "$MEM0_ENCRYPTION_KEY" ]; then
            tar czf - /tmp/mem0-qdrant | \
              openssl enc -aes-256-cbc -salt -pbkdf2 -iter 100000 \
              -pass env:MEM0_ENCRYPTION_KEY \
              -out /tmp/mem0-encrypted.tar.gz.enc
            [ -f "/tmp/mem0-encrypted.tar.gz.enc" ] && rm -rf /tmp/mem0-qdrant
          fi

      - name: Save mem0 memory cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /tmp/mem0-encrypted.tar.gz.enc
            /tmp/mem0-qdrant
          key: mem0-db-${{ github.repository }}-v1

      # ── Validate and commit ────────────────────────────
      - name: Check for changes
        id: validate
        env:
          IMPL_BRANCH: ${{ steps.spec.outputs.impl_branch }}
        run: |
          # Goose's developer extension may commit during execution,
          # so check both uncommitted changes AND new commits vs origin/main.
          UNCOMMITTED=false
          COMMITTED=false

          if ! git diff --quiet || ! git diff --cached --quiet; then
            UNCOMMITTED=true
          fi

          NEW_COMMITS=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          if [ "$NEW_COMMITS" -gt 0 ]; then
            COMMITTED=true
          fi

          if [ "$UNCOMMITTED" = "false" ] && [ "$COMMITTED" = "false" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Goose did not produce any code changes"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "has_uncommitted=$UNCOMMITTED" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --numstat origin/main 2>/dev/null || true)
            DIFF_STAT_COMMITTED=$(git diff --numstat origin/main..HEAD 2>/dev/null || true)
            COMBINED_STAT="${DIFF_STAT}${DIFF_STAT_COMMITTED}"
            if [ -n "$COMBINED_STAT" ]; then
              echo "diff_files=$(echo "$COMBINED_STAT" | sort -u | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
              echo "diff_insertions=$(echo "$COMBINED_STAT" | awk '{s+=$1}END{print s+0}')" >> "$GITHUB_OUTPUT"
              echo "diff_deletions=$(echo "$COMBINED_STAT" | awk '{s+=$2}END{print s+0}')" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Commit and push
        if: steps.validate.outputs.has_changes == 'true'
        env:
          ISSUE_NUM: ${{ steps.spec.outputs.issue_number }}
          SPEC_PR: ${{ steps.spec.outputs.spec_pr_number }}
          IMPL_BRANCH: ${{ steps.spec.outputs.impl_branch }}
          HAS_UNCOMMITTED: ${{ steps.validate.outputs.has_uncommitted }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage any uncommitted changes (Goose may have committed some/all already)
          if [ "$HAS_UNCOMMITTED" = "true" ]; then
            git add -A
            git reset HEAD -- "specs/issue-${ISSUE_NUM}-spec.md" 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "impl: Issue #${ISSUE_NUM} - Goose implementation

          Automated implementation based on spec from PR #${SPEC_PR}.
          Generated by Goose via recipe (wgmesh-implementation.yaml).
          Validated: go build, go test, go vet passed (recipe retry checks)."
            fi
          fi

          git push origin "$IMPL_BRANCH"

      # ── Create implementation PR ───────────────────────
      - name: Create implementation PR
        if: steps.validate.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNum = '${{ steps.spec.outputs.issue_number }}';
            const specPR = '${{ steps.spec.outputs.spec_pr_number }}';
            const implBranch = '${{ steps.spec.outputs.impl_branch }}';

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `impl: Issue #${issueNum} - Goose implementation`,
              head: implBranch,
              base: 'main',
              draft: false,
              body: [
                `## Goose Implementation`,
                ``,
                `Closes #${issueNum}`,
                ``,
                `Automated implementation for **Issue #${issueNum}**`,
                `Based on specification from **PR #${specPR}**`,
                ``,
                `### Pipeline`,
                `| Step | Status |`,
                `|------|--------|`,
                `| Issue | #${issueNum} |`,
                `| Spec | PR #${specPR} |`,
                `| Goose implementation | This PR |`,
                `| Human code review | **Pending** |`,
                ``,
                `### Validation (recipe retry checks)`,
                `- [x] \`go build ./...\``,
                `- [x] \`go test ./...\``,
                `- [x] \`go vet ./...\``,
                ``,
                `---`,
                `*Generated by [Goose](https://github.com/block/goose) via recipe.*`,
              ].join('\n')
            });

            await github.graphql(`
              mutation($prId: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $prId, mergeMethod: SQUASH}) {
                  clientMutationId
                }
              }
            `, { prId: pr.node_id });

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['goose-implementation', 'needs-review']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: parseInt(issueNum),
              body: `Goose implementation: **PR #${pr.number}** (spec: PR #${specPR})`
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: parseInt(specPR),
              body: `Implementation PR created: #${pr.number}`
            });

      - name: Report no changes
        if: steps.validate.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const specPR = '${{ steps.spec.outputs.spec_pr_number }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: parseInt(specPR),
              body: `**Goose did not produce any code changes.** Check the [workflow run](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`
            });

      # ── Metrics ────────────────────────────────────────
      - name: Collect agent metrics
        if: always()
        env:
          ISSUE_NUM: ${{ steps.spec.outputs.issue_number }}
          SPEC_PR: ${{ steps.spec.outputs.spec_pr_number }}
        run: |
          METRICS_FILE="/tmp/agent-metrics-goose-${ISSUE_NUM}.json"
          jq -n \
            --argjson schema_version 1 \
            --arg stage "goose_build" \
            --arg issue_number "$ISSUE_NUM" \
            --arg spec_pr_number "$SPEC_PR" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg goose_succeeded "${{ steps.goose.outputs.goose_succeeded }}" \
            --arg goose_duration "${{ steps.goose.outputs.goose_duration }}" \
            --arg goose_lines "${{ steps.goose.outputs.goose_lines }}" \
            --arg has_changes "${{ steps.validate.outputs.has_changes }}" \
            --arg diff_files "${{ steps.validate.outputs.diff_files }}" \
            --arg diff_ins "${{ steps.validate.outputs.diff_insertions }}" \
            --arg diff_del "${{ steps.validate.outputs.diff_deletions }}" \
            '{
              schema_version: $schema_version,
              stage: $stage,
              issue_number: ($issue_number | tonumber? // 0),
              spec_pr_number: ($spec_pr_number | tonumber? // 0),
              timestamp: $timestamp,
              goose: {
                succeeded: ($goose_succeeded == "true"),
                duration_seconds: ($goose_duration | tonumber? // 0),
                output_lines: ($goose_lines | tonumber? // 0)
              },
              validation: { has_changes: ($has_changes == "true") },
              diff: {
                files_changed: ($diff_files | tonumber? // 0),
                insertions: ($diff_ins | tonumber? // 0),
                deletions: ($diff_del | tonumber? // 0)
              }
            }' > "$METRICS_FILE" || true
          cat "$METRICS_FILE" 2>/dev/null || echo "Failed to generate metrics"

      - name: Upload agent metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-metrics-goose-${{ steps.spec.outputs.issue_number }}
          path: /tmp/agent-metrics-goose-*.json
          retention-days: 90
          if-no-files-found: ignore
