name: Goose Review — Address PR Feedback

# Triggered by auto-merge.yml when a PR has unresolved Copilot review threads.
# Checks out the PR branch, feeds the review comments to Goose via recipe, and pushes a fix commit.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number with unresolved review comments'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: goose-review-${{ github.event.inputs.pr_number }}
      cancel-in-progress: true

    steps:
      - name: Validate API keys
        run: |
          has_key=false
          [ -n "$ZAI_API_KEY" ] && has_key=true && echo "Z.ai API key: configured"
          [ -n "$OPENROUTER_API_KEY" ] && has_key=true && echo "OpenRouter API key: configured"
          if [ "$has_key" = false ]; then
            echo "::error::No API keys configured (need ZAI_API_KEY or OPENROUTER_API_KEY)"
            exit 1
          fi

      - name: Fetch PR metadata and unresolved Copilot threads
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUSH_TOKEN }}
          script: |
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}', 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            if (pr.state !== 'open') {
              core.setFailed(`PR #${prNumber} is not open (state: ${pr.state})`);
              return;
            }

            const prGql = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                        path
                        line
                        comments(first: 5) {
                          nodes {
                            body
                            author { login }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, repo, number: prNumber });

            const allThreads = prGql.repository.pullRequest.reviewThreads.nodes;
            const unresolvedCopilot = allThreads.filter(t => {
              if (t.isResolved) return false;
              const login = t.comments.nodes[0]?.author?.login || '';
              return login.includes('copilot') || login.includes('bot');
            });

            if (unresolvedCopilot.length === 0) {
              core.info(`PR #${prNumber}: no unresolved Copilot threads`);
              core.setOutput('skip', 'true');
              return;
            }

            core.info(`PR #${prNumber}: ${unresolvedCopilot.length} unresolved thread(s)`);

            let feedback = `# PR #${prNumber} Review Feedback\n\n`;
            feedback += `Branch: \`${pr.head.ref}\`\n`;
            feedback += `Title: ${pr.title}\n\n`;
            feedback += `## Unresolved Reviewer Comments\n\n`;

            for (const thread of unresolvedCopilot) {
              feedback += `### ${thread.path}${thread.line ? `:${thread.line}` : ''}\n\n`;
              for (const comment of thread.comments.nodes) {
                feedback += `**${comment.author.login}:** ${comment.body}\n\n`;
              }
              feedback += `---\n\n`;
            }

            core.setOutput('skip', 'false');
            core.setOutput('branch', pr.head.ref);
            core.setOutput('feedback', feedback);

      - name: Skip if no threads
        if: steps.pr.outputs.skip == 'true'
        run: echo "No unresolved Copilot threads — exiting cleanly."

      - name: Checkout repository
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          fetch-depth: 0

      - name: Copy recipe from main before switching branches
        if: steps.pr.outputs.skip != 'true'
        run: |
          cp .github/goose-recipes/wgmesh-review.yaml /tmp/wgmesh-review.yaml

      - name: Checkout PR branch
        if: steps.pr.outputs.skip != 'true'
        env:
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"

      - name: Use recipe from main
        if: steps.pr.outputs.skip != 'true'
        run: |
          cp /tmp/wgmesh-review.yaml .github/goose-recipes/wgmesh-review.yaml

      - name: Configure git identity
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name "goose-bot"
          git config user.email "goose-bot@users.noreply.github.com"

      - name: Install Goose CLI
        if: steps.pr.outputs.skip != 'true'
        run: |
          curl -fsSL "https://github.com/block/goose/releases/latest/download/download_cli.sh" \
            -o /tmp/goose-install.sh
          CONFIGURE=false bash /tmp/goose-install.sh
          rm /tmp/goose-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          $HOME/.local/bin/goose --version

      - name: Setup Go
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Record pre-Goose HEAD
        id: pre
        if: steps.pr.outputs.skip != 'true'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run Goose review with model cascade
        id: goose
        if: steps.pr.outputs.skip != 'true'
        env:
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GOOSE_MODE: "auto"
          REVIEW_FEEDBACK: ${{ steps.pr.outputs.feedback }}
        run: |
          set -o pipefail

          # Write feedback to file — Goose reads it directly (not via template substitution)
          printf '%s\n' "$REVIEW_FEEDBACK" > /tmp/review-feedback.txt

          RECIPE=".github/goose-recipes/wgmesh-review.yaml"

          # Cascade: GLM-5 via Z.ai direct (subscription) → Claude Sonnet via OpenRouter.
          # Z.ai exposes an OpenAI-compatible API, so Goose uses the "openai" provider
          # with OPENAI_HOST pointed at Z.ai's coding endpoint.
          run_goose() {
            local provider="$1" model="$2" label="$3"
            echo "::group::Trying $label ($provider/$model)"

            sed -i "s|goose_provider:.*|goose_provider: \"$provider\"|" "$RECIPE"
            sed -i "s|goose_model:.*|goose_model: \"$model\"|" "$RECIPE"

            local code=0
            timeout 2700 goose run \
              --recipe "$RECIPE" \
              --no-session \
              2>&1 | tee /tmp/goose-review-output.log || code=$?

            # Check for credit/auth/model errors
            if grep -qiE '(add more credits|insufficient.*(funds|credits|balance)|rate.limit|unauthorized|api.key.not.found|model.*not.*found|not.*available)' /tmp/goose-review-output.log; then
              echo "::warning::$label: error detected, trying next provider"
              git checkout -- . 2>/dev/null || true
              git clean -fd 2>/dev/null || true
              echo "::endgroup::"
              return 1
            fi

            if [ "$code" -eq 0 ] || [ "$code" -eq 124 ]; then
              [ "$code" -eq 124 ] && echo "::warning::Goose timed out (likely hung after completing work)"
              echo "::endgroup::"
              return 0
            fi

            echo "::warning::$label: Goose exited with status $code"
            tail -20 /tmp/goose-review-output.log
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            echo "::endgroup::"
            return 1
          }

          goose_ok=false

          # Cascade: Z.ai GLM-5 → OpenRouter BYOK models (GPT-5.4 → Mistral → Venice)
          # GLM-5 uses Z.ai direct (subscription). The rest use OpenRouter with BYOK keys
          # so no OpenRouter credits are consumed.

          # 1. GLM-5 via Z.ai direct (GLM Coding Plan subscription)
          if [ "$goose_ok" = false ] && [ -n "$ZAI_API_KEY" ]; then
            export OPENAI_API_KEY="$ZAI_API_KEY"
            export OPENAI_HOST="https://api.z.ai"
            export OPENAI_BASE_PATH="/api/coding/paas/v4"
            run_goose "openai" "glm-5" "Z.ai GLM-5" && goose_ok=true
            unset OPENAI_API_KEY OPENAI_HOST OPENAI_BASE_PATH
          fi

          # 2. GPT-5.4 via OpenRouter (BYOK: OpenAI key)
          if [ "$goose_ok" = false ] && [ -n "$OPENROUTER_API_KEY" ]; then
            run_goose "openrouter" "openai/gpt-5.4" "OpenRouter GPT-5.4" && goose_ok=true
          fi

          # 3. Mistral Large via OpenRouter (BYOK: Mistral key)
          if [ "$goose_ok" = false ] && [ -n "$OPENROUTER_API_KEY" ]; then
            run_goose "openrouter" "mistralai/mistral-large" "OpenRouter Mistral Large" && goose_ok=true
          fi

          # 4. Venice Uncensored via OpenRouter (BYOK: Venice key, free tier)
          if [ "$goose_ok" = false ] && [ -n "$OPENROUTER_API_KEY" ]; then
            run_goose "openrouter" "venice/uncensored:free" "OpenRouter Venice" && goose_ok=true
          fi

          echo "goose_ok=$goose_ok" >> "$GITHUB_OUTPUT"
          if [ "$goose_ok" = false ]; then
            echo "::warning::All providers failed"
          fi

      - name: Commit and push changes
        id: push
        if: steps.pr.outputs.skip != 'true' && steps.goose.outputs.goose_ok == 'true'
        env:
          PR_NUM: ${{ github.event.inputs.pr_number }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          # Discard recipe overlay before committing (it came from main, not this branch)
          git checkout -- .github/goose-recipes/ 2>/dev/null || true

          # Goose may have committed changes itself (via the developer extension).
          # Check for both: new commits since pre-Goose HEAD, and uncommitted changes.
          PRE_SHA="${{ steps.pre.outputs.sha }}"
          has_new_commits=false
          has_uncommitted=false

          if [ "$(git rev-parse HEAD)" != "$PRE_SHA" ]; then
            has_new_commits=true
            echo "Goose created $(git rev-list --count "$PRE_SHA"..HEAD) commit(s)"
          fi

          git add -A
          if ! git diff --cached --quiet; then
            has_uncommitted=true
            git commit -m "fix(review): address PR #${PR_NUM} reviewer feedback"
          fi

          if [ "$has_new_commits" = true ] || [ "$has_uncommitted" = true ]; then
            git push origin "$PR_BRANCH"
            echo "changes=pushed" >> "$GITHUB_OUTPUT"
          else
            echo "No changes made by Goose — review comments may already be addressed."
            echo "changes=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Copilot review threads
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUSH_TOKEN }}
          script: |
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}', 10);
            const gooseOk = '${{ steps.goose.outputs.goose_ok }}' === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Only resolve threads if Goose succeeded (pushed changes or found nothing to change).
            // If Goose failed, leave threads unresolved for manual attention.
            if (!gooseOk) {
              core.info('Goose failed — leaving threads unresolved for manual review');
              return;
            }

            // Re-fetch threads to get current state (Goose may have resolved some)
            const prGql = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, repo, number: prNumber });

            const threads = prGql.repository.pullRequest.reviewThreads.nodes;
            const unresolvedCopilot = threads.filter(t => {
              if (t.isResolved) return false;
              const login = t.comments.nodes[0]?.author?.login || '';
              return login.includes('copilot') || login.includes('bot');
            });

            core.info(`Resolving ${unresolvedCopilot.length} Copilot thread(s)`);

            for (const thread of unresolvedCopilot) {
              try {
                await github.graphql(`
                  mutation($threadId: ID!) {
                    resolveReviewThread(input: { threadId: $threadId }) {
                      thread { isResolved }
                    }
                  }
                `, { threadId: thread.id });
              } catch (err) {
                core.warning(`Failed to resolve thread ${thread.id}: ${err.message}`);
              }
            }

            core.info(`Resolved ${unresolvedCopilot.length} Copilot thread(s) on PR #${prNumber}`);

      - name: Comment on PR
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUSH_TOKEN }}
          script: |
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}', 10);
            const gooseOk = '${{ steps.goose.outputs.goose_ok }}' === 'true';
            const changes = '${{ steps.push.outputs.changes }}';

            let body;
            if (!gooseOk) {
              body = '**Goose review failed.** Could not process review comments — manual attention needed.';
            } else if (changes === 'pushed') {
              body = '**Goose review complete.** Changes pushed to address reviewer comments. Copilot threads resolved.';
            } else {
              body = '**Goose review complete.** No changes needed — reviewer comments already addressed. Copilot threads resolved.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
